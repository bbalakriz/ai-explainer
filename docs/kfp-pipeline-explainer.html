    base_image="python:3.11",
    packages_to_install=["numpy", "pandas"]
)
def load_dataset(
    dataset_path: str,
    output_data: Output[Dataset],
):
    import json
    import pandas as pd

    # All imports MUST be inside the function body
    # This is the "hermetic" requirement
    data = pd.read_json(dataset_path)
    data.to_json(output_data.path, orient="records")
    output_data.metadata["num_rows"] = len(data)`;

    base_image="pytorch/pytorch:2.1.0-cuda12.1",

)
def sft_train(
    train_data: Input[Dataset],
    base_model: str,
    learning_rate: float,
    epochs: int,
    adapter_out: Output[Model],
):
    # target_image removes hermetic constraint
    # Can import from adjacent modules

const PIPELINE_CODE = `@dsl.pipeline(name="sft-eval-merge-pipeline")
def sft_pipeline(
    dataset_path: str = "gs://bucket/train.jsonl",
    base_model: str  = "Qwen/Qwen2.5-32B-Instruct",
    threshold: float = 0.85,
):
    # 1. Load data → Output[Dataset]
    data_task = load_dataset(dataset_path=dataset_path)

    # 2. Fine-tune → Output[Model]
    sft_task = sft_train(
        train_data=data_task.outputs["output_data"],
        base_model=base_model,
        learning_rate=2e-4,
        epochs=3,
    )
    sft_task.set_cpu_limit("4")
    sft_task.set_memory_limit("16Gi")
    sft_task.set_gpu_limit("4")
    sft_task.set_retry(num_retries=2, backoff_duration="60s")

    # 3. Evaluate → float score
    eval_task = evaluate(
        adapter=sft_task.outputs["adapter_out"],
        eval_data=data_task.outputs["output_data"],
    )

    # 4. Conditional branching (KFP v2)
    with dsl.If(eval_task.output >= threshold):
        merge_weights(
            adapter=sft_task.outputs["adapter_out"],
            base_model=base_model,
        )

    with dsl.Else():
        retrain(
            train_data=data_task.outputs["output_data"],
            base_model=base_model,
        )`;

const ARTIFACTS_CODE = `from kfp.dsl import Input, Output, Dataset, Model, Metrics

@dsl.component
def evaluate(
    adapter: Input[Model],       # read-only artifact from upstream
    eval_data: Input[Dataset],   # read-only artifact from upstream
    metrics_out: Output[Metrics],# pre-constructed, write to it
) -> float:                      # small data → returned as parameter
    score = run_eval(adapter.path, eval_data.path)

    # Log metrics for KFP dashboard visualization
    metrics_out.log_metric("eval_score", score)
    metrics_out.log_metric("eval_loss", 1.0 - score)

    # Artifact metadata (key-value pairs)
    metrics_out.metadata["model_name"] = "qwen2.5-32b"
    metrics_out.metadata["dataset_size"] = 5000

    return score  # float → used by dsl.If downstream`;

const CONTROL_FLOW_CODE = `# ── Conditional Branching ──
with dsl.If(eval_task.output >= 0.85):
    merge_task = merge_weights(adapter=sft.output)
with dsl.Elif(eval_task.output >= 0.70):
    retrain_task = retrain(data=data.output, lr=1e-5)
with dsl.Else():
    alert_task = alert_team(msg="Score too low")

# ── Gather output from branches ──
result = dsl.OneOf(
    merge_task.output,
    retrain_task.output,
    alert_task.output,
)
log_result(value=result)

# ── Parallel Fan-Out ──
with dsl.ParallelFor(items=[1, 5, 10, 25], parallelism=2) as epochs:
    t = train_model(epochs=epochs)
pick_best(models=dsl.Collected(t.outputs["model"]))

# ── Exit Handler (cleanup) ──
with dsl.ExitHandler(exit_task=cleanup()):
    train()  # cleanup runs even if this fails`;

function CodeViewer({ code, highlightedLines, highlightColor, label }) {
  const lines = code.split('\n');
  const hlColor = highlightColor || 'highlighted';
  return (
    <div className="rounded-xl border border-slate-700/60 bg-[#0b1121] overflow-hidden">
      <div className="flex items-center gap-2 px-4 py-2 bg-slate-800/40 border-b border-slate-700/40">
        <div className="w-2.5 h-2.5 rounded-full bg-red-500/60"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/60"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-green-500/60"></div>
        <span className="mono text-[10px] text-slate-500 ml-2">{label || 'Python'}</span>
      </div>
      <div className="overflow-x-auto p-0" style={{ maxHeight: '520px', overflowY: 'auto' }}>
        {lines.map((line, i) => {
          const lineNum = i + 1;
          const isHL = highlightedLines && highlightedLines.includes(lineNum);
          return (
            <div key={i} className={`code-line flex px-2 py-[1px] ${isHL ? hlColor : ''}`}>
              <span className="mono text-[10px] text-slate-600 w-8 text-right mr-3 select-none flex-shrink-0">{lineNum}</span>
              <span className="mono text-[11px] whitespace-pre" style={{ color: colorizePython(line) }}>{line}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function colorizePython(line) {
  const trimmed = line.trim();
  if (trimmed.startsWith('#')) return '#64748b';
  if (trimmed.startsWith('@')) return '#fbbf24';
  if (trimmed.startsWith('def ')) return '#60a5fa';
  if (trimmed.startsWith('from ') || trimmed.startsWith('import ')) return '#c084fc';
  if (trimmed.startsWith('with ')) return '#c084fc';
  if (trimmed.startsWith('return ')) return '#c084fc';
  if (/^\s*(with\s+)?dsl\.(If|Elif|Else|OneOf|ParallelFor|ExitHandler|Collected)/.test(line)) return '#fbbf24';
  if (/^\s*\w+_task\s*=\s*\w+/.test(line) || /^\s*\w+\s*=\s*\w+\(/.test(line)) return '#60a5fa';
  if (/^\s*\w+\.set_/.test(line) || /^\s*\w+\.add_/.test(line)) return '#67e8f9';
  if (/^\s*(Input|Output|Dataset|Model|Metrics)/.test(line)) return '#67e8f9';
  if (/^\s*\)/.test(trimmed) || /^\s*\]/.test(trimmed)) return '#94a3b8';
  if (/"[^"]*"/.test(line) || /'[^']*'/.test(line)) return '#86efac';
  if (/:\s*(str|int|float|bool|list|dict)/.test(line)) return '#67e8f9';
  return '#cbd5e1';
}

}

    { id: 'control', label: 'Control Flow', icon: 'IF', color: '#f59e0b', defaultSection: 'control' },
  ];

  const handleCategoryChange = (newCategory) => {
    const cat = categories.find(c => c.id === newCategory);
    setCategory(newCategory);
    setActiveSection(cat.defaultSection);

    if (category === 'components') {

      return COMPONENT_CODE;
    }
    if (category === 'pipeline') return PIPELINE_CODE;
    if (category === 'data') {
      if (activeSection === 'parameters') return PIPELINE_CODE;
      return ARTIFACTS_CODE;
    }
    if (category === 'control') return CONTROL_FLOW_CODE;
    return COMPONENT_CODE;
  };

function ConfigTab() {
  const [activeConfig, setActiveConfig] = useState('resources');

  const configs = [
    {
      id: 'resources',
      title: 'Resource Limits',
      subtitle: 'CPU, memory, and GPU allocation for pipeline steps',
      icon: 'RES',
      color: '#3b82f6',
      items: [
        {
          method: 'set_cpu_limit("4")',
          desc: 'Sets the Kubernetes CPU resource limit. The pod is CPU-throttled if it exceeds this. For training steps, match the number of data-loading workers.',
          example: 'sft_task.set_cpu_limit("4")\nsft_task.set_cpu_request("2")  # guaranteed minimum',
        },
        {
          method: 'set_memory_limit("16Gi")',
          desc: 'Sets the Kubernetes memory limit. The pod is OOM-killed if it exceeds this. Set based on: model size (FP16 weights) + optimizer states + batch data + KV-cache overhead.',
          example: 'sft_task.set_memory_limit("16Gi")\nsft_task.set_memory_request("8Gi")',
        },
        {
          method: 'set_gpu_limit("4")',
          desc: 'Requests nvidia.com/gpu resources. Must match tensor-parallel-size if using distributed inference/training. The Kubernetes scheduler finds nodes with sufficient free GPUs.',
          example: 'sft_task.set_gpu_limit("4")  # 4x NVIDIA GPUs',
        },
        {
          method: 'set_accelerator_type("nvidia.com/gpu")',
          desc: 'Specifies the accelerator type for GPU scheduling. Usually "nvidia.com/gpu" but can be "amd.com/gpu" or custom resource names for TPUs.',
          example: 'sft_task.set_accelerator_type("nvidia.com/gpu")',
        },
      ]
    },
    {
      id: 'retry',
      title: 'Retry & Error Handling',
      subtitle: 'Handling transient failures in ML workloads',
      icon: 'RTY',
      color: '#f59e0b',
      items: [
        {
          method: 'set_retry(num_retries=2, backoff_duration="60s", backoff_factor=2.0)',
          desc: 'Retries a step on failure with exponential backoff. Critical for GPU workloads that may hit transient OOM, preemption, or network errors. The backoff_factor multiplies the duration on each retry (60s -> 120s -> 240s).',
          example: 'sft_task.set_retry(\n    num_retries=3,\n    backoff_duration="60s",\n    backoff_factor=2.0,\n)',
        },
        {
          method: 'dsl.ExitHandler(exit_task=cleanup())',
          desc: 'Guarantees a cleanup task runs after the pipeline completes -- even if earlier steps fail. Use PipelineTaskFinalStatus to inspect what happened and send notifications.',
          example: 'with dsl.ExitHandler(exit_task=notify()):\n    train()\n    evaluate()',
        },
      ]
    },
    {
      id: 'caching',
      title: 'Caching',
      subtitle: 'Skip re-execution when inputs have not changed',
      icon: 'CHE',
      color: '#22c55e',
      items: [
        {
          method: 'set_caching_options(enable_caching=True)',
          desc: 'When enabled (default), KFP checks if the step has been run before with identical inputs. If so, it reuses the cached outputs instead of re-executing the step. This dramatically speeds up iterative development.',
          example: 'data_task.set_caching_options(True)\n# Re-running pipeline skips data loading\n# if dataset_path has not changed',
        },
        {
          method: 'Disabling cache for non-deterministic steps',
          desc: 'Disable caching for steps with side effects or non-deterministic behavior (random seeds, API calls, time-dependent logic). Training steps should generally have caching disabled since you want fresh runs.',
          example: 'sft_task.set_caching_options(False)\n# Always re-run training even if\n# inputs are identical',
        },
      ]
    },
    {
      id: 'env',
      title: 'Environment & Scheduling',
      subtitle: 'Env vars, node selection, and tolerations',
      icon: 'ENV',
      color: '#a855f7',
      items: [
        {
          method: 'set_env_variable("HF_HOME", "/tmp/hf_home")',
          desc: 'Injects environment variables into the container. Essential for configuring HuggingFace cache directories, API tokens, CUDA settings, and training framework options.',
          example: 'sft_task.set_env_variable("HF_HOME", "/tmp/hf")\nsft_task.set_env_variable("NCCL_DEBUG", "INFO")\nsft_task.set_env_variable("CUDA_VISIBLE_DEVICES", "0,1,2,3")',
        },
        {
          method: 'add_node_selector_constraint("nvidia.com/gpu.present", "true")',
          desc: 'Constrains scheduling to nodes with specific labels. Ensures GPU workloads land on GPU-equipped nodes and prevents accidental scheduling on CPU-only nodes.',
          example: 'sft_task.add_node_selector_constraint(\n    "nvidia.com/gpu.present", "true"\n)',
        },
        {
          method: 'add_toleration(key, operator, value, effect)',
          desc: 'Allows the pod to be scheduled on nodes with matching taints. GPU nodes are often tainted with NoSchedule to repel non-GPU workloads.',
          example: 'sft_task.add_toleration(\n    key="nvidia.com/gpu",\n    operator="Exists",\n    effect="NoSchedule",\n)',
        },
      ]
    },
  ];

  const activeConf = configs.find(c => c.id === activeConfig);

  return (

      <div className="text-center mb-5">
        <h2 className="text-xl font-bold text-white mb-1">Task Configuration Deep Dive</h2>

      {/* Config selector */}
      <div className="flex gap-2 mb-5 justify-center flex-wrap">
        {configs.map(c => (
          <button key={c.id} onClick={() => setActiveConfig(c.id)}
            className={`flex items-center gap-2 px-3 py-2 rounded-lg text-[11px] font-medium transition-all border ${

          &#8592; Previous
        </button>
        <span className="mono text-[10px] text-slate-500 self-center">Step {activeStep + 1} / {steps.length}</span>
        <button onClick={() => setActiveStep(Math.min(steps.length - 1, activeStep + 1))}
          disabled={activeStep === steps.length - 1}
          className={`px-4 py-2 rounded-lg text-sm font-medium transition-all ${
            activeStep === steps.length - 1 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-500 shadow-lg shadow-blue-500/20'
          }`}>
          Next &#8594;
        </button>
      </div>

      {/* Common pitfalls */}
      <div className="mt-6 rounded-2xl border border-slate-700/40 bg-slate-800/15 p-5">
        <h3 className="text-sm font-bold text-white mb-3">Common Pitfalls & Solutions</h3>
        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
          {[
            { pitfall: 'ImportError in lightweight component', solution: 'All imports must be inside the function body. Move "import pandas" inside the @dsl.component function.', color: '#f43f5e' },
            { pitfall: 'OOM killed during training', solution: 'Increase set_memory_limit() and set_gpu_limit(). Check if --max-model-len is too large for available VRAM.', color: '#f59e0b' },
            { pitfall: 'Artifact not found error', solution: 'Verify the S3 credentials in the Data Connection. Check that the pipeline ServiceAccount has access.', color: '#3b82f6' },
            { pitfall: 'Pipeline compiles but pods stay Pending', solution: 'Check if GPU nodes have capacity. Verify nodeSelector matches available node labels. Check for resource quota limits.', color: '#a855f7' },
            { pitfall: 'Caching returns stale results', solution: 'Disable caching for non-deterministic steps with set_caching_options(False). Caching uses input hash -- same inputs = same cache key.', color: '#22c55e' },
            { pitfall: 'dsl.If condition type error', solution: 'The condition must compare a parameter or simple return value (int, float, str, bool). Cannot compare artifacts directly.', color: '#06b6d4' },
          ].map((item, i) => (
            <div key={i} className="rounded-lg border border-slate-700/30 bg-slate-900/20 p-3">
              <div className="text-[11px] font-semibold mb-1" style={{ color: item.color }}>{item.pitfall}</div>
              <div className="text-[10px] text-slate-400">{item.solution}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
