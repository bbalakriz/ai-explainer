function YamlViewer({ yaml, highlightedLines, highlightColor }) {
  const lines = yaml.split('\n');
  const hlColor = highlightColor || 'highlighted';
  return (
    <div className="rounded-xl border border-slate-700/60 bg-[#0b1121] overflow-hidden">
      <div className="flex items-center gap-2 px-4 py-2 bg-slate-800/40 border-b border-slate-700/40">
        <div className="w-2.5 h-2.5 rounded-full bg-red-500/60"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/60"></div>
        <div className="w-2.5 h-2.5 rounded-full bg-green-500/60"></div>
        <span className="mono text-[10px] text-slate-500 ml-2">YAML</span>
      </div>
      <div className="overflow-x-auto p-0" style={{ maxHeight: '520px', overflowY: 'auto' }}>
        {lines.map((line, i) => {
          const lineNum = i + 1;
          const isHL = highlightedLines && highlightedLines.includes(lineNum);
          return (
            <div key={i} className={`yaml-line flex px-2 py-[1px] ${isHL ? hlColor : ''}`}>
              <span className="mono text-[10px] text-slate-600 w-8 text-right mr-3 select-none flex-shrink-0">{lineNum}</span>
              <span className="mono text-[11px] whitespace-pre" style={{ color: colorizeYaml(line) }}>{line}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function colorizeYaml(line) {
  if (line.trim().startsWith('#')) return '#6b7280';
  if (line.trim().startsWith('- ')) return '#a5b4fc';
  if (/^\s*(apiVersion|kind|metadata|spec|name|labels|template|containers|annotations|predictor|model|resources|args|env|ports|tolerations|nodeSelector|limits|requests):/.test(line)) return '#93c5fd';
  if (/:\s*"[^"]*"/.test(line) || /:\s*'[^']*'/.test(line)) return '#fde68a';
  if (/:\s*\d+/.test(line)) return '#86efac';
  return '#cbd5e1';
}

function DetailCard({ detail, color }) {
  return (
    <div className="flex gap-3 items-start py-2 px-3 rounded-lg bg-slate-800/30 border border-slate-700/30">
      <div className="w-1 h-full rounded-full flex-shrink-0 self-stretch" style={{ background: color, minHeight: '24px' }}></div>
      <div className="flex-1 min-w-0">
        <div className="flex items-baseline gap-2 flex-wrap">
          <span className="mono text-[11px] font-semibold text-slate-200">{detail.label}</span>
          <span className="mono text-[10px] text-slate-400 break-all">{detail.value}</span>
        </div>
        <div className="text-[10px] text-slate-500 mt-0.5">{detail.note}</div>
      </div>
    </div>
  );
}

function SectionBadge({ icon, color, size }) {
  const sz = size || 36;
  return (
    <div className="flex items-center justify-center rounded-lg mono text-[10px] font-bold flex-shrink-0"
      style={{ width: sz, height: sz, background: `${color}20`, color: color, border: `1px solid ${color}40` }}>
      {icon}
    </div>
  );
}

function SectionSelector({ sections, activeSection, setActiveSection }) {
  return (
    <div className="flex gap-2 mb-5 flex-wrap justify-center">
      {sections.map(s => (
        <button key={s.id} onClick={() => setActiveSection(s.id)}
          className={`flex items-center gap-2 px-3 py-2 rounded-lg text-[11px] font-medium transition-all border ${
            s.id === activeSection
              ? 'shadow-lg'
              : 'bg-slate-800/40 border-slate-700/40 text-slate-400 hover:bg-slate-700/40'
          }`}
          style={s.id === activeSection ? {
            background: `${s.color}15`,
            borderColor: `${s.color}50`,
            color: s.color,
            boxShadow: `0 0 12px 2px ${s.color}20`
          } : {}}>
          <SectionBadge icon={s.icon} color={s.color} size={24}/>
          {s.title}
        </button>
      ))}
    </div>
  );
}

function DeepDiveLayout({ sections, activeSection, setActiveSection, yaml, highlightColor, children }) {
  const section = sections.find(s => s.id === activeSection);
  return (
    <div className="fade-in">
      <SectionSelector sections={sections} activeSection={activeSection} setActiveSection={setActiveSection}/>
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
        <div>

              tab.id === activeTab
                ? 'bg-green-600/20 border-green-500/40 text-green-300 shadow-lg shadow-green-500/10'
                : 'bg-slate-800/30 border-slate-700/30 text-slate-400 hover:bg-slate-700/30 hover:text-slate-300'
            }`}>
            <span className={`mono text-[10px] font-bold px-1.5 py-0.5 rounded ${
              tab.id === activeTab ? 'bg-green-500/20 text-green-300' : 'bg-slate-700/30 text-slate-500'
            }`}>{tab.icon}</span>
            {tab.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div className="min-h-[500px]">
        {activeTab === 'overview' && <OverviewTab />}
        {activeTab === 'concepts' && <ConceptsTab />}
        {activeTab === 'runtime' && <RuntimeTab />}
        {activeTab === 'encoder' && <EncoderTab />}
        {activeTab === 'decoder' && <DecoderTab />}
        {activeTab === 'compare' && <CompareTab />}
        {activeTab === 'verify' && <VerifyTab />}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
