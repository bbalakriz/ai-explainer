    - Include realistic telco-specific details: package
      names, prices in Thai Baht, data amounts, dates
    - Some examples should include [Options: {...}] in
      assistant responses for interactive choices
    - Make user messages contextually consistent with the
      session_history

    CRITICAL CONSTRAINT - SLIDING WINDOW:
    The real system uses a sliding window of the last 5
    messages. Therefore:
    - session_history MUST contain AT MOST 5 messages
      (max 5 objects in the array)
    - Valid lengths: 0, 1, 2, 3, 4, or 5 messages
    - NEVER exceed 5 messages in session_history

    TYPOS AND INFORMAL LANGUAGE - VERY IMPORTANT:
    Real Thai chat users make frequent typos and use
    informal language. You MUST include these patterns
    in at least 8-10 of the 20 examples:
    - Common Thai typos: "เนต" instead of "เน็ต",
      "มัย" instead of "ไหม", "เเ" instead of "แ",
      "ค้าบ" instead of "ครับ", "ค่าาา" with extra

    - Misspelled Thai words: "ตรจสอบ" instead of

    - Informal/slang: "555" for laughter, "ป่าว/ปะ/มะ"

    - Missing spaces, run-on words, emoji usage

    SENTENCE & WORD DIVERSITY - VERY IMPORTANT:
    Real users express the same intent in wildly different
    ways. You MUST vary sentence structure and word choice:
    - Vary the verb: "เช็ค","ดู","อยากรู้","ขอ","สอบถาม"
    - Vary sentence form: questions, statements,
      imperatives, fragments, conversational
    - Vary directness: very direct, indirect/polite, casual
    - Vary message length: single word to full sentence
    - Avoid starting more than 2-3 examples with the same

    INTENT CHANGES IN HISTORY - VERY IMPORTANT:
    In real chat, users often switch topics mid-conversation.
    At least 5-6 of the 20 examples MUST have session_history
    where the previous conversation was about a DIFFERENT
    topic/intent before the user switches to the current
    intent.

- role: user
  content: |
    Generate exactly {{ num_examples }} new training
    examples for the intent: {{ intent }}

    Here is a description of this intent:
    {{ intent_description }}

    Here are {{ num_seed }} existing examples for reference:
    {{ seed_examples }}

    REQUIREMENTS:
    1. Output MUST be a valid JSON array
    2. Each object has exactly 3 fields: "user_message",
       "intent", "session_history"
    3. "session_history" is an array of
       {"role": "user"|"assistant", "content": "..."} objects
    4. session_history MUST have AT MOST 5 messages.
       Distribute lengths like this:
       - 2 examples with empty session_history []
       - 3 examples with 1 message in history
       - 4 examples with 2 messages in history
       - 4 examples with 3 messages in history
       - 4 examples with 4 messages in history
       - 3 examples with 5 messages in history (MAX)
    5. The user_message must be semantically aligned with
       the intent
    6. At least 5-6 examples MUST have session_history
       about a COMPLETELY DIFFERENT topic (intent change)
    7. At least 8-10 examples MUST contain realistic Thai
       typos, misspellings, informal slang, or emoji
    8. Include variety: formal/informal register,
       male/female particles (ครับ/ค่ะ), with/without emoji
    9. Some examples should have user providing phone number
    10. Some with user confirming assistant-presented options
    11. Include 2-3 examples in English (non-native style)

    Output ONLY the JSON array, no markdown, no explanation.`;

    why: 'If you randomly pick 5 seeds from a pool of 25, you might get 5 examples that all have 4-message histories — the LLM would then only generate long conversations. The diversity sampling strategy ensures the model sees a representative distribution of conversation depths, leading to more balanced output.',

    code: `def select_seed_examples(
    examples: list[dict],
    max_seeds: int = 5
) -> list[dict]:
    """Pick a diverse subset of seed examples
    (varied history lengths)."""
    # Group by history length
    by_len = {}
    for ex in examples:
        h_len = len(ex.get("session_history", []))
        by_len.setdefault(h_len, []).append(ex)

    selected = []
    buckets = sorted(by_len.keys())  # e.g., [0, 2, 4, 5]
    idx = 0
    # Round-robin: take one from each bucket
    while len(selected) < max_seeds and idx < len(examples):
        for b in buckets:
            if by_len[b] and len(selected) < max_seeds:
                selected.append(by_len[b].pop(0))
        idx += 1

    # Enforce sliding window on selected seeds
    for ex in selected:
        if len(ex.get("session_history", [])) > 5:
            ex["session_history"] = \\
                ex["session_history"][-5:]

    return selected`,

    desc: 'Loads the YAML prompt template from prompts/generate_telco_chat.yaml and performs variable substitution. The template defines a 2-message chat array — a system message and a user message — that together form the complete instructions for the LLM. The system message establishes the LLM\'s role as an expert data generator, encodes Thai telco domain expertise, and specifies constraints (sliding window, typo ratios, diversity requirements, intent switching). The user message requests N examples for a specific intent, provides seed examples, and lists 11 detailed requirements with distribution targets.',
    code: `def build_prompt(
    intent: str,
    seed_examples: list[dict],
    num_examples: int = 20
) -> list[dict]:
    """Build chat messages for the LLM call."""
    prompt_path = Path(__file__).parent / \\
        "prompts" / "generate_telco_chat.yaml"

    import yaml
    with open(prompt_path) as f:
        template_messages = yaml.safe_load(f)

    # Jinja2-style variable substitution
    seed_json = json.dumps(
        seed_examples, ensure_ascii=False, indent=2
    )
    description = INTENT_DESCRIPTIONS.get(
        intent, f"Intent: {intent}"
    )

    messages = []
    for msg in template_messages:
        content = msg["content"]
        content = content.replace(
            "{{ intent }}", intent)
        content = content.replace(
            "{{ intent_description }}", description)
        content = content.replace(
            "{{ seed_examples }}", seed_json)
        content = content.replace(
            "{{ num_examples }}", str(num_examples))
        content = content.replace(
            "{{ num_seed }}", str(len(seed_examples)))
        messages.append({
            "role": msg["role"],
            "content": content
        })
    return messages`,

  { num: 6, title: 'LLM Generation', sub: 'litellm.completion() or sdg_hub.Flow', color: '#60a5fa',

    desc: 'The built prompt is sent to the chosen LLM for generation. The pipeline supports two execution backends: Standalone mode calls litellm.completion() directly for each intent, processing them sequentially one at a time. This is simpler, has fewer dependencies, and handles errors per-intent (one failure doesn\'t stop the others). Flow mode passes all intents through a 3-block sdg_hub.Flow pipeline that can process up to 5 intents concurrently, making it roughly 4x faster for full 16-intent runs. Both modes use temperature=0.8 (creative enough for diverse examples, structured enough for valid JSON) and max_tokens=16384 (enough for 20 full examples with conversation histories).',
    code: `# STANDALONE MODE (default)
def generate_with_litellm(intent, seed_examples,

    messages = build_prompt(

# FLOW MODE (production)
def generate_with_flow(intents_data, model, ...):

  { num: 7, title: 'Parse & Validate', sub: 'parse_json_output() + validate_examples()', color: '#fb923c',
    why: 'LLMs are unreliable JSON producers — they may add markdown fences, produce partial output, hallucinate extra fields, or generate wrong intent labels. The parse-and-validate stage acts as a safety net that catches and fixes these issues programmatically, ensuring every saved example meets the exact schema the training pipeline expects.',
    desc: 'This is the quality gate of the pipeline. First, parse_json_output() extracts a JSON array from the raw LLM text — handling markdown code fences, locating the first [ and last ] brackets, and attempting json.loads(). If that fails, it attempts line-by-line recovery. Second, validate_examples() applies 6 validation checks to each parsed example: (1) must be a dict, (2) must contain user_message, (3) forces the correct intent label (overriding whatever the LLM output), (4) validates session_history is a list of {role, content} objects, (5) only allows role values of "user" or "assistant", and (6) truncates histories exceeding 5 messages. Invalid examples are silently dropped. The output contains only 3 fields per example — no extras.',
    code: `def parse_json_output(text: str) -> list[dict]:
    """Extract a JSON array from LLM output."""
    text = text.strip()
    # Strip markdown code fences if present
    if text.startswith("\`\`\`"):
        lines = text.split("\\n")
        lines = [l for l in lines
                 if not l.strip().startswith("\`\`\`")]
        text = "\\n".join(lines).strip()

    # Find the JSON array brackets
    start = text.find("[")
    end = text.rfind("]")
    if start != -1 and end != -1:
        json_str = text[start : end + 1]
        try:
            data = json.loads(json_str)
            if isinstance(data, list):
                return data
        except json.JSONDecodeError:
            pass
    # Fallback: attempt line-by-line recovery
    print("  WARNING: Could not parse full JSON...")
    return []

def validate_examples(examples, intent):
    valid = []
    for ex in examples:
        if not isinstance(ex, dict): continue
        if "user_message" not in ex: continue
        ex["intent"] = intent  # Force correct label
        # Validate history structure
        cleaned = []
        for msg in ex.get("session_history", []):
            if isinstance(msg, dict) \\
               and "role" in msg \\
               and "content" in msg \\
               and msg["role"] in ("user","assistant"):
                cleaned.append({
                    "role": msg["role"],
                    "content": str(msg["content"])
                })
        # Enforce sliding window: max 5 messages
        if len(cleaned) > 5:
            cleaned = cleaned[-5:]
        valid.append({
            "user_message": str(ex["user_message"]),
            "intent": intent,
            "session_history": cleaned,
        })
    return valid`,
    details: [
      { label: 'Markdown stripping', value: 'Removes ```json ... ``` fences', note: 'Many LLMs wrap their JSON output in markdown code blocks despite being told not to. The parser strips any lines starting with ``` before attempting to parse, handling both ```json and plain ``` variants.' },

      { label: 'Sliding window enforcement', value: 'Truncates to last 5 messages', note: 'Even if the LLM generates a 7-message history (violating the prompt constraint), the code programmatically keeps only the last 5. This is the "belt and suspenders" approach — the prompt requests the constraint, the code enforces it.' },
      { label: 'Field stripping', value: 'Outputs only 3 fields', note: 'The output dict is constructed with exactly user_message, intent, and session_history — nothing else. If the LLM added extra fields (like "confidence", "category", "metadata"), they are silently dropped.' },
    ] },
  { num: 8, title: 'Save & Summarize', sub: 'json.dump() → generated/{INTENT}.json', color: '#2dd4bf',
    why: 'The output format exactly matches the seed data schema — this means generated data can be mixed directly with seed data for training without any reformatting step. One file per intent makes it easy to regenerate individual intents that failed or need improvement.',
    desc: 'Each intent\'s validated examples are written to their own JSON file in the output directory (default: generated_intents/). The files are named after the intent: e.g., MOBILE_BILLING_CHECK_DUE_DATE.json. After all intents are processed, a summary report is printed to stdout showing the count of generated examples per intent file and the grand total across all intents. Files are written with ensure_ascii=False to preserve Thai text and indent=2 for readability.',

function YamlViewer({ yaml, highlightedLines, highlightColor }) {
  const lines = yaml.split('\n');
  const hlColor = highlightColor || 'hl-purple';
  return (
    <div className="rounded-xl border border-slate-700/60 bg-[#0b1121] overflow-hidden">
      <div className="flex items-center gap-2 px-4 py-2 bg-slate-800/40 border-b border-slate-700/40">
        <div className="w-2 h-2 rounded-full bg-red-500/60"></div>
        <div className="w-2 h-2 rounded-full bg-yellow-500/60"></div>
        <div className="w-2 h-2 rounded-full bg-green-500/60"></div>
        <span className="mono text-[10px] text-slate-500 ml-2">generate_telco_chat.yaml</span>
      </div>
      <div className="overflow-x-auto p-0" style={{ maxHeight: '550px', overflowY: 'auto' }}>
        {lines.map((line, i) => {
          const lineNum = i + 1;
          const isHL = highlightedLines && highlightedLines.includes(lineNum);
          let color = '#cbd5e1';
          if (line.trim().startsWith('#')) color = '#6b7280';
          else if (line.trim().startsWith('- ')) color = '#a5b4fc';
          else if (/^\s*(role|content):/.test(line)) color = '#93c5fd';
          else if (/\{\{.*?\}\}/.test(line)) color = '#fbbf24';
          return (
            <div key={i} className={`yaml-line flex px-2 py-[1px] ${isHL ? hlColor : ''}`}>
              <span className="mono text-[10px] text-slate-600 w-8 text-right mr-3 select-none flex-shrink-0">{lineNum}</span>
              <span className="mono text-[11px] whitespace-pre" style={{ color }}>{line}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function IntentsTab() {
  const [filter, setFilter] = useState('');
  const [expanded, setExpanded] = useState(null);
  const filtered = useMemo(() => {
    const lc = filter.toLowerCase();
    return INTENTS.filter(i => !lc || i.name.toLowerCase().includes(lc) || i.cat.includes(lc) || i.desc.toLowerCase().includes(lc) || i.thai.includes(lc));
  }, [filter]);
  const catCounts = useMemo(() => { const c = {}; INTENTS.forEach(i => { c[i.cat] = (c[i.cat]||0)+1; }); return c; }, []);

  return (
    <div className="fade-in space-y-5">
      <div className="text-center mb-2">
        <h2 className="text-xl font-bold text-white mb-2">Intent Browser</h2>
        <p className="text-[13px] text-slate-400 max-w-2xl mx-auto leading-relaxed">All 16 intent categories covered by the pipeline. Each description tells the LLM what kind of customer request this intent represents. Click any intent to see its full description. Use the category filters or search box to narrow down.</p>
      </div>
      <div className="flex flex-wrap gap-2 justify-center">
        {Object.entries(catCounts).map(([cat, count]) => {
          const c = CAT_COLORS[cat];
          return (
            <button key={cat} onClick={() => setFilter(filter === cat ? '' : cat)}
              className={`flex items-center gap-1.5 px-3 py-1.5 rounded-full text-[11px] font-medium transition-all border ${filter === cat ? 'shadow' : 'bg-slate-800/40 border-slate-700/40 text-slate-400'}`}
              style={filter === cat ? { background: c.bg, borderColor: `${c.color}50`, color: c.color } : {}}>
              <span className="w-2 h-2 rounded-full" style={{ background: c.color }}></span>
              {c.label} ({count})
            </button>
          );
        })}
        {filter && <button onClick={() => setFilter('')} className="text-[11px] text-slate-500 hover:text-slate-300 px-2">Clear</button>}
      </div>
      <input type="text" value={filter} onChange={e => setFilter(e.target.value)}
        className="w-full px-4 py-3 rounded-lg bg-slate-900/60 border border-slate-700/40 mono text-[12px] text-slate-200 outline-none focus:border-cyan-500/50"
        placeholder="Search intents... (e.g., billing, roaming, sim, activation)"/>
      <div className="space-y-2">
        {filtered.map((intent, i) => {
          const c = CAT_COLORS[intent.cat];
          const isExp = expanded === i;
          return (
            <div key={i} className={`rounded-lg border p-4 cursor-pointer transition-all ${isExp ? 'bg-slate-800/30' : 'bg-slate-900/30 hover:bg-slate-800/20'}`}
              style={{ borderColor: isExp ? c.color : 'rgba(51,65,85,0.3)' }} onClick={() => setExpanded(isExp ? null : i)}>
              <div className="flex items-center gap-3">
                <span className="text-[10px] px-2 py-0.5 rounded-full font-medium flex-shrink-0" style={{ background: c.bg, color: c.color }}>{c.label}</span>
                <span className="mono text-[11px] font-semibold text-slate-200 flex-1 min-w-0">{intent.name}</span>
                <span className="text-[13px] text-slate-400 flex-shrink-0">{intent.thai}</span>
              </div>
              {isExp && (
                <div className="mt-3 pt-3 border-t border-slate-700/30 fade-in">
                  <p className="text-[12px] text-slate-400 leading-relaxed">{intent.desc}</p>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function BestPracticesTab() {
  const practices = [
    { num: '01', title: 'Match Training to Inference', desc: 'Training data must mirror production conditions exactly. If the classifier receives a 5-message sliding window at inference, generate training data with the same constraint. Mismatched context lengths cause silent accuracy drops that are extremely difficult to diagnose — the model trains successfully but underperforms in production because it learned patterns from context lengths it never sees at serving time. Enforce max history length in the prompt AND in code (belt and suspenders).', tags: ['Critical','Architecture'], color: '#06b6d4' },
    { num: '02', title: 'Diversify Seed Selection', desc: 'Don\'t pick seeds randomly — use stratified sampling across conversation depths (0, 1, 2, 3, 4, 5 messages). The select_seed_examples() function implements round-robin across history-length buckets. Random selection biases toward the most common pattern: if most seeds have 4-message histories, the LLM generates only long conversations. Round-robin ensures the model sees empty histories, single exchanges, and full 5-message conversations equally.', tags: ['Seeding'], color: '#a855f7' },
    { num: '03', title: 'Force Intent Switching', desc: 'Require 25-30% of examples (5-6 out of 20) to have session history about a completely different topic. Without this, the classifier learns a dangerous shortcut: if the history mentions "roaming", predict roaming, regardless of what the user actually said in their current message. Intent switching teaches the model that user_message alone determines intent. The history provides context but should not override the current message\'s semantics.', tags: ['Critical','Context'], color: '#22c55e' },
    { num: '04', title: 'Embrace Messy Input', desc: 'Real Thai chat includes typos ("เนต" vs "เน็ต"), slang ("555" for laughter), emoji, doubled vowels ("ค่าาา"), missing spaces, and mixed Thai-English. Target 40-50% informal examples (8-10 of 20). If training data is only clean formal Thai, the classifier fails on real user input. The prompt lists specific typo patterns to generate because without examples, LLMs default to producing perfectly spelled formal text.', tags: ['Language','Realism'], color: '#fbbf24' },
    { num: '05', title: 'Include Multilingual Examples', desc: 'The telco serves bilingual users and expats who type in English. Include 10-15% English examples (2-3 of 20) with intentional grammar mistakes typical of non-native speakers. Messages like "can u check my bill pls" or "how much roaming data left ah" are real usage patterns. Use non-native English patterns — not perfect grammar — to match what the classifier will actually encounter.', tags: ['Coverage'], color: '#f43f5e' },
    { num: '06', title: 'Mask Sensitive Data', desc: 'Never expose real phone numbers or OTPs in synthetic data. Use consistent masking formats: 091234XXXX for phone numbers (partial masking preserves the realistic appearance while preventing PII leakage) and XXXXXX for OTP codes (fully masked). Embed these masking rules in the system prompt so every generated example follows the same convention.', tags: ['Security'], color: '#60a5fa' },
    { num: '07', title: 'Validate Programmatically', desc: 'Never trust LLM output blindly. The prompt requests constraints; the code enforces them. validate_examples() checks 6 things: (1) each example is a dict, (2) has user_message, (3) forces correct intent label, (4) validates session_history structure, (5) only allows "user"/"assistant" roles, (6) truncates histories exceeding 5 messages. Invalid examples are dropped silently, and the output contains only 3 fields — no LLM-added extras.', tags: ['Quality','Reliability'], color: '#fb923c' },
    { num: '08', title: 'Version Control Prompts', desc: 'Store prompt templates as YAML files in git, not in code or chat history. This makes every prompt change a reviewable code change — you can git diff to see what changed, trace which prompt version produced which dataset, and reproduce any previous run exactly. Separate system prompt (role/constraints) from user prompt (task/variables) for clarity.', tags: ['Process'], color: '#2dd4bf' },
    { num: '09', title: 'Stay Model-Agnostic', desc: 'Use an abstraction layer like litellm so you can swap models (Qwen, Llama, GPT-4o, Claude) and providers (Nebius, OpenAI, Ollama, vLLM) without changing pipeline code. Today\'s best model isn\'t tomorrow\'s. The pipeline should be a tool that works with any capable LLM, not a wrapper around a specific API. One --model flag to switch everything.', tags: ['Architecture'], color: '#06b6d4' },
    { num: '10', title: 'Define Clear Intent Boundaries', desc: 'Each intent description must specify what it IS and what it ISN\'T. The descriptions in intent_descriptions.json distinguish postpaid vs prepaid, current vs historical, roaming vs domestic, check vs subscribe. Ambiguous intents produce ambiguous data — if the LLM doesn\'t understand the boundary between MOBILE_BILLING_PAYMENT_STATUS_POSTPAID and MOBILE_BILLING_CHECK_DUE_DATE, it generates overlapping examples.', tags: ['Data Quality'], color: '#a855f7' },
    { num: '11', title: 'Control Distribution Targets', desc: 'Specify exact distribution requirements in the prompt: how many examples per history length (2 empty, 3 with 1 msg, 4 with 2 msgs, 4 with 3 msgs, 4 with 4 msgs, 3 with 5 msgs), typo ratio (40-50%), intent switches (25-30%), and English examples (10-15%). Without explicit numeric targets, the LLM defaults to its most comfortable pattern — usually generating all examples with the same history length and formal language.', tags: ['Quality'], color: '#22c55e' },
    { num: '12', title: 'Maximize Sentence Diversity', desc: 'LLMs tend to repeat the same phrasing pattern — generating 15 of 20 user_message values starting with "อยากเช็ค...". The prompt explicitly requires varied verbs (เช็ค, ดู, อยากรู้, ขอ, สอบถาม), sentence forms (questions, statements, imperatives, fragments), directness levels (direct "เช็คบิล" vs polite "รบกวนสอบถามยอดค่าบริการ"), and message lengths (single phrase to full sentence with context). Hard cap: max 2-3 examples with the same opening word.', tags: ['Critical','Diversity'], color: '#f43f5e' },
    { num: '13', title: 'Fail Gracefully, Retry Smart', desc: 'LLMs sometimes produce malformed output. parse_json_output() handles this with multi-stage recovery: strip markdown fences → find array brackets → json.loads() → line-by-line fallback. Skip bad examples instead of crashing the entire pipeline. Per-intent error handling in standalone mode means one failed intent doesn\'t stop the other 15. Re-run individual failures with --intents flag without regenerating everything.', tags: ['Reliability'], color: '#60a5fa' },
  ];
  return (
    <div className="fade-in space-y-5">
      <div className="text-center mb-4">
        <h2 className="text-xl font-bold text-white mb-2">SDG Best Practices</h2>
        <p className="text-[13px] text-slate-400 max-w-2xl mx-auto leading-relaxed">13 lessons learned from building production-grade synthetic data for Thai telco intent classification. Each practice addresses a specific failure mode — they're not theoretical guidelines but fixes for real problems encountered during classifier training.</p>
      </div>
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {practices.map((bp, i) => (
          <div key={i} className="benefit-card rounded-xl border border-slate-700/30 bg-slate-900/40 p-5 relative overflow-hidden">
            <div className="absolute top-3 right-3 mono text-[28px] font-extrabold text-slate-800/40">{bp.num}</div>
            <div className="flex items-center gap-2 mb-3">
              <div className="w-2 h-6 rounded-full" style={{ background: bp.color }}></div>
              <h4 className="text-[13px] font-bold" style={{ color: bp.color }}>{bp.title}</h4>
            </div>
            <p className="text-[11px] text-slate-400 leading-relaxed mb-3">{bp.desc}</p>
            <div className="flex gap-1.5 flex-wrap">
              {bp.tags.map((t,j) => (
                <span key={j} className="mono text-[9px] px-2 py-0.5 rounded-full border" style={{ background: `${bp.color}10`, borderColor: `${bp.color}30`, color: bp.color }}>{t}</span>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ======================================================================
// TAB: QUIZ
// ======================================================================

function QuizTab() {
  const [answers, setAnswers] = useState({});
  const score = Object.values(answers).filter(a => a.correct).length;
  const total = QUIZ_QUESTIONS.length;
  const answered = Object.keys(answers).length;
  const answer = (qi, oi) => { if (answers[qi] !== undefined) return; setAnswers(prev => ({ ...prev, [qi]: { selected: oi, correct: oi === QUIZ_QUESTIONS[qi].ans } })); };
  const reset = () => setAnswers({});

  return (
    <div className="fade-in space-y-5">
      <div className="text-center mb-4">
        <h2 className="text-xl font-bold text-white mb-2">SDG Pipeline Quiz</h2>
        <p className="text-[13px] text-slate-400 max-w-2xl mx-auto leading-relaxed">Test your understanding of the pipeline's design decisions and implementation details. {total} questions covering architecture, constraints, and rationale.</p>
      </div>
      {answered > 0 && (
        <div className="rounded-xl border border-slate-700/40 bg-slate-800/20 p-5 text-center">
          <div className="mono text-3xl font-extrabold text-cyan-300">{score}/{total}</div>
          <div className="text-[12px] text-slate-400 mt-1">Correct Answers</div>
          {answered === total && <button onClick={reset} className="mt-3 px-4 py-2 rounded-lg border border-cyan-500/40 text-cyan-300 mono text-[12px] hover:bg-cyan-500/10 transition-all">Reset Quiz</button>}
        </div>
      )}
      <div className="space-y-4">
        {QUIZ_QUESTIONS.map((q, qi) => {
          const a = answers[qi];
          return (
            <div key={qi} className={`rounded-xl border p-5 transition-all ${a ? (a.correct ? 'border-green-500/40' : 'border-red-500/40') : 'border-slate-700/30 bg-slate-900/30'}`}>
              <div className="mono text-[10px] text-cyan-400 uppercase tracking-wider mb-2">Question {String(qi+1).padStart(2,'0')} / {total}</div>
              <div className="text-[14px] font-semibold text-slate-200 mb-4 leading-relaxed">{q.q}</div>
              <div className="space-y-2">
                {q.opts.map((opt, oi) => {
                  const L = ['A','B','C','D'][oi];
                  let cls = 'bg-slate-800/40 border-slate-700/30 text-slate-400 hover:border-slate-600 cursor-pointer';
                  if (a) {
                    cls = 'opacity-60 cursor-default border-slate-700/20';
                    if (oi === a.selected && a.correct) cls = 'border-green-500/50 bg-green-500/10 text-green-300';
                    else if (oi === a.selected) cls = 'border-red-500/50 bg-red-500/10 text-red-300';
                    else if (oi === q.ans) cls = 'border-green-500/30 text-green-400/70';
                  }
                  return (
                    <div key={oi} onClick={() => answer(qi, oi)} className={`flex items-center gap-3 px-4 py-3 rounded-lg border transition-all text-[12px] ${cls}`}>
                      <span className={`mono text-[11px] font-bold w-6 h-6 rounded-md flex items-center justify-center flex-shrink-0 border ${
                        a && oi === a.selected && a.correct ? 'bg-green-500 border-green-500 text-slate-900' :
                        a && oi === a.selected ? 'bg-red-500 border-red-500 text-white' :
                        a && oi === q.ans ? 'border-green-500/40 text-green-400' : 'border-slate-600/40 text-slate-500'
                      }`}>{L}</span>
                      {opt}
                    </div>
                  );
                })}
              </div>
              {a && <div className="mt-3 p-3 rounded-lg bg-slate-800/40 text-[11px] text-slate-400 leading-relaxed fade-in" style={{borderLeft:'3px solid #22c55e'}}>{q.exp}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ======================================================================
// MAIN APP
// ======================================================================

const TABS = [
  { id: 'overview', label: 'Overview', icon: '◉' },
  { id: 'pipeline', label: 'Pipeline', icon: '▶' },
  { id: 'prompt', label: 'Prompt', icon: '◆' },
  { id: 'config', label: 'Config', icon: '⚙' },
  { id: 'intents', label: 'Intents', icon: '☰' },
  { id: 'practices', label: 'Best Practices', icon: '★' },
  { id: 'quiz', label: 'Quiz', icon: '?' },
];

function App() {
  const [tab, setTab] = useState('overview');
  return (
    <div className="relative z-10 min-h-screen">
      <header className="sticky top-0 z-50 border-b border-slate-700/40 bg-[#060a14ee] backdrop-blur-xl">
        <div className="max-w-5xl mx-auto px-5 flex items-center h-14 gap-6 overflow-x-auto">
          <span className="mono text-[14px] font-bold text-cyan-300 tracking-wider whitespace-nowrap flex-shrink-0">SDG PIPELINE</span>
          <div className="flex gap-1 flex-1 min-w-0">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-[14px] font-medium transition-all whitespace-nowrap ${tab === t.id ? 'bg-cyan-500/15 text-cyan-300' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800/40'}`}>
                <span className="text-[12px]">{t.icon}</span> {t.label}
              </button>
            ))}
          </div>
        </div>
      </header>
      <main className="max-w-5xl mx-auto px-5 py-10">
        {tab === 'overview' && <OverviewTab />}
        {tab === 'pipeline' && <PipelineTab />}
        {tab === 'prompt' && <PromptTab />}
        {tab === 'config' && <ConfigTab />}
        {tab === 'intents' && <IntentsTab />}
        {tab === 'practices' && <BestPracticesTab />}
        {tab === 'quiz' && <QuizTab />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
