<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Encoder vs Decoder SFT — Fine-Tuning Explainer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Source+Code+Pro:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #060a14;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .mono { font-family: 'Source Code Pro', monospace; }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0c1220; }
  ::-webkit-scrollbar-thumb { background: #2a3a5c; border-radius: 4px; }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  @keyframes pulseGlow { 0%,100% { box-shadow:0 0 8px 2px rgba(59,130,246,0.15); } 50% { box-shadow:0 0 18px 4px rgba(59,130,246,0.35); } }
  @keyframes cyanPulse { 0%,100% { box-shadow:0 0 8px 2px rgba(6,182,212,0.15); } 50% { box-shadow:0 0 18px 4px rgba(6,182,212,0.35); } }
  @keyframes amberPulse { 0%,100% { box-shadow:0 0 8px 2px rgba(251,191,36,0.15); } 50% { box-shadow:0 0 18px 4px rgba(251,191,36,0.35); } }
  @keyframes greenPulse { 0%,100% { box-shadow:0 0 8px 2px rgba(34,197,94,0.15); } 50% { box-shadow:0 0 18px 4px rgba(34,197,94,0.35); } }
  @keyframes rosePulse { 0%,100% { box-shadow:0 0 8px 2px rgba(244,63,94,0.15); } 50% { box-shadow:0 0 18px 4px rgba(244,63,94,0.35); } }
  @keyframes flowDash { to { stroke-dashoffset: -24; } }
  @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-4px); } }

  .fade-in { animation: fadeIn 0.35s ease-out; }
  .glow-blue { animation: pulseGlow 2.5s ease-in-out infinite; }
  .glow-cyan { animation: cyanPulse 2.5s ease-in-out infinite; }
  .glow-amber { animation: amberPulse 2.5s ease-in-out infinite; }
  .glow-green { animation: greenPulse 2.5s ease-in-out infinite; }
  .glow-rose { animation: rosePulse 2.5s ease-in-out infinite; }
  .arrow-flow { stroke-dasharray: 8 5; animation: flowDash 1s linear infinite; }

  .callout-box {
    position: relative;
    border-radius: 12px;
    padding: 16px;
    transition: all 0.3s ease;
  }
  .callout-box::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 13px;
    padding: 1px;
    background: linear-gradient(135deg, var(--callout-color, #3b82f6) 0%, transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .benefit-card {
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }
  .benefit-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(135deg, transparent 60%, var(--accent, rgba(59,130,246,0.05)));
    pointer-events: none;
  }
  .benefit-card:hover { transform: translateY(-3px); }

  .comparison-row:hover { background: rgba(59,130,246,0.05); }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// ======================================================================
// SHARED COMPONENTS
// ======================================================================

function StatCard({ value, label, color = '#3b82f6', icon }) {
  return (
    <div className="rounded-xl border border-slate-700/40 bg-slate-900/40 p-4 text-center" style={{ borderTopColor: color, borderTopWidth: '2px' }}>
      {icon && <div className="text-lg mb-1">{icon}</div>}
      <div className="text-xl font-bold text-white mb-0.5" style={{ color }}>{value}</div>
      <div className="text-[11px] text-slate-400">{label}</div>
    </div>
  );
}

function CompareCard({ title, children, color = '#3b82f6', badge }) {
  return (
    <div className="rounded-xl border border-slate-700/40 bg-slate-900/30 overflow-hidden">
      <div className="px-4 py-3 border-b border-slate-700/30 flex items-center gap-2" style={{ borderLeftWidth: '3px', borderLeftColor: color }}>
        <span className="mono text-[10px] font-bold px-2 py-0.5 rounded" style={{ background: color + '20', color }}>{badge}</span>
        <span className="text-sm font-semibold text-white">{title}</span>
      </div>
      <div className="p-4">{children}</div>
    </div>
  );
}

function DetailItem({ label, value, note, color = '#3b82f6' }) {
  return (
    <div className="flex gap-3 items-start">
      <div className="w-1 rounded-full self-stretch mt-1" style={{ background: color, minHeight: '20px' }}></div>
      <div>
        <div className="text-[11px] text-slate-500 uppercase tracking-wide">{label}</div>
        <div className="mono text-[13px] text-white font-medium">{value}</div>
        {note && <div className="text-[11px] text-slate-400 mt-0.5">{note}</div>}
      </div>
    </div>
  );
}

function SectionHeading({ number, title, subtitle }) {
  return (
    <div className="mb-4">
      <div className="flex items-center gap-3 mb-1">
        <span className="mono text-[10px] font-bold px-2 py-1 rounded-lg bg-blue-500/15 text-blue-400 border border-blue-500/20">{number}</span>
        <h2 className="text-lg font-bold text-white">{title}</h2>
      </div>
      {subtitle && <p className="text-sm text-slate-400 ml-10">{subtitle}</p>}
    </div>
  );
}

function CodeSnippet({ children }) {
  return <code className="mono text-[12px] px-1.5 py-0.5 rounded bg-slate-800/80 text-cyan-300 border border-slate-700/40">{children}</code>;
}


// ======================================================================
// TAB 1: OVERVIEW
// ======================================================================

function OverviewTab() {
  return (
    <div className="fade-in space-y-8">
      <div className="text-center mb-2">
        <h2 className="text-xl font-bold text-white mb-2">Encoder vs Decoder SFT at a Glance</h2>
        <p className="text-sm text-slate-400 max-w-2xl mx-auto">
          Both approaches fine-tune a model for <span className="text-cyan-300 font-semibold">Thai telco intent classification</span> (16 intents) using
          LoRA adapters on the same dataset with an 80/10/10 split.
          Both use the same MLflow lineage tracking pattern, cosine LR scheduler, and the same data columns.
        </p>
      </div>

      {/* Key Stats */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatCard value="Encoder" label="PhayaThaiBERT (278M)" color="#f43f5e" />
        <StatCard value="Decoder" label="Qwen 2.5-3B-Instruct (3B)" color="#fbbf24" />
        <StatCard value="1.19M" label="Encoder trainable (0.43% of 278M)" color="#22c55e" />
        <StatCard value="~32M" label="Decoder trainable (~1% of 3B, est.)" color="#3b82f6" />
      </div>

      {/* Architecture Diagram */}
      <div className="relative rounded-2xl border border-slate-700/50 bg-slate-900/30 p-6 overflow-hidden">
        <svg width="100%" height="520" viewBox="0 0 960 520" className="mx-auto block" style={{ maxWidth: '960px' }}>
          <defs>
            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
              <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(59,130,246,0.06)" strokeWidth="0.5"/>
            </pattern>
            <marker id="arrowRose" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#f43f5e"/>
            </marker>
            <marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
            </marker>
            <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
            </marker>
            <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
              <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
            </marker>
          </defs>
          <rect width="960" height="520" fill="url(#grid)"/>

          {/* Title */}
          <text x="480" y="28" textAnchor="middle" className="text-[11px] font-bold" fill="#64748b">Same Dataset, Two Approaches to Intent Classification</text>

          {/* Dataset (center top) */}
          <rect x="350" y="50" width="260" height="75" rx="14" fill="#0d1424" stroke="#06b6d440" strokeWidth="1.5"/>
          <text x="480" y="72" textAnchor="middle" className="text-[12px] font-bold" fill="#22d3ee">Shared Dataset </text>
          <text x="480" y="89" textAnchor="middle" className="mono text-[9px]" fill="#94a3b8">user_message + intent + session_history</text>
          <text x="480" y="105" textAnchor="middle" className="mono text-[9px]" fill="#64748b">80/10/10 split &bull; 16 Thai telco intents</text>

          {/* Arrow down-left to Encoder */}
          <path d="M 420 125 L 240 170" stroke="#f43f5e" strokeWidth="2" markerEnd="url(#arrowRose)" className="arrow-flow" fill="none"/>
          {/* Arrow down-right to Decoder */}
          <path d="M 540 125 L 720 170" stroke="#fbbf24" strokeWidth="2" markerEnd="url(#arrowAmber)" className="arrow-flow" fill="none"/>

          {/* Encoder Path */}
          <rect x="100" y="170" width="280" height="55" rx="12" fill="#0d1424" stroke="#f43f5e40" strokeWidth="1.5"/>
          <text x="240" y="192" textAnchor="middle" className="text-[11px] font-bold" fill="#f43f5e">Preprocessing: Flatten + Tokenize</text>
          <text x="240" y="210" textAnchor="middle" className="mono text-[8px]" fill="#94a3b8">Concatenate history into pipe-delimited string, pad to 512</text>

          <line x1="240" y1="225" x2="240" y2="260" stroke="#f43f5e" strokeWidth="1.5" markerEnd="url(#arrowRose)" className="arrow-flow"/>

          <rect x="100" y="260" width="280" height="70" rx="12" fill="#0d1424" stroke="#f43f5e40" strokeWidth="1.5"/>
          <text x="240" y="282" textAnchor="middle" className="text-[12px] font-bold" fill="#f43f5e">PhayaThaiBERT (278M)</text>
          <text x="240" y="298" textAnchor="middle" className="mono text-[9px]" fill="#94a3b8">AutoModelForSequenceClassification</text>
          <text x="240" y="314" textAnchor="middle" className="mono text-[9px]" fill="#94a3b8">LoRA: query, value (0.43% params)</text>

          <line x1="240" y1="330" x2="240" y2="365" stroke="#f43f5e" strokeWidth="1.5" markerEnd="url(#arrowRose)" className="arrow-flow"/>

          <rect x="100" y="365" width="280" height="55" rx="12" fill="#0d1424" stroke="#f43f5e40" strokeWidth="1.5"/>
          <text x="240" y="387" textAnchor="middle" className="text-[11px] font-bold" fill="#f43f5e">Classification Head (768 -&gt; 16)</text>
          <text x="240" y="403" textAnchor="middle" className="mono text-[8px]" fill="#94a3b8">Cross-entropy loss &bull; argmax over 16 logits</text>

          <line x1="240" y1="420" x2="240" y2="455" stroke="#f43f5e" strokeWidth="1.5" markerEnd="url(#arrowRose)" className="arrow-flow"/>

          <rect x="140" y="455" width="200" height="40" rx="10" fill="#f43f5e15" stroke="#f43f5e50" strokeWidth="1.5"/>
          <text x="240" y="478" textAnchor="middle" className="mono text-[11px] font-bold" fill="#f43f5e">Integer Label (0-15)</text>

          {/* Decoder Path */}
          <rect x="580" y="170" width="280" height="55" rx="12" fill="#0d1424" stroke="#fbbf2440" strokeWidth="1.5"/>
          <text x="720" y="192" textAnchor="middle" className="text-[11px] font-bold" fill="#fbbf24">Preprocessing: Chat Template</text>
          <text x="720" y="210" textAnchor="middle" className="mono text-[8px]" fill="#94a3b8">Multi-turn ChatML with generation markers</text>

          <line x1="720" y1="225" x2="720" y2="260" stroke="#fbbf24" strokeWidth="1.5" markerEnd="url(#arrowAmber)" className="arrow-flow"/>

          <rect x="580" y="260" width="280" height="70" rx="12" fill="#0d1424" stroke="#fbbf2440" strokeWidth="1.5"/>
          <text x="720" y="282" textAnchor="middle" className="text-[12px] font-bold" fill="#fbbf24">Qwen 2.5-3B-Instruct</text>
          <text x="720" y="298" textAnchor="middle" className="mono text-[9px]" fill="#94a3b8">AutoModelForCausalLM (4-bit QLoRA)</text>
          <text x="720" y="314" textAnchor="middle" className="mono text-[9px]" fill="#94a3b8">LoRA: 7 modules per layer (q/k/v/o + MLP)</text>

          <line x1="720" y1="330" x2="720" y2="365" stroke="#fbbf24" strokeWidth="1.5" markerEnd="url(#arrowAmber)" className="arrow-flow"/>

          <rect x="580" y="365" width="280" height="55" rx="12" fill="#0d1424" stroke="#fbbf2440" strokeWidth="1.5"/>
          <text x="720" y="387" textAnchor="middle" className="text-[11px] font-bold" fill="#fbbf24">LM Head (token generation)</text>
          <text x="720" y="403" textAnchor="middle" className="mono text-[8px]" fill="#94a3b8">Next-token loss (assistant turns only)</text>

          <line x1="720" y1="420" x2="720" y2="455" stroke="#fbbf24" strokeWidth="1.5" markerEnd="url(#arrowAmber)" className="arrow-flow"/>

          <rect x="600" y="455" width="240" height="40" rx="10" fill="#fbbf2415" stroke="#fbbf2450" strokeWidth="1.5"/>
          <text x="720" y="478" textAnchor="middle" className="mono text-[10px] font-bold" fill="#fbbf24">{`{"intent": "CHECK_BALANCE"}`}</text>
        </svg>
      </div>

      {/* Core Difference Callout */}
      <div className="callout-box bg-slate-900/40" style={{ '--callout-color': '#06b6d4' }}>
        <div className="flex items-start gap-3">
          <span className="text-cyan-400 text-lg mt-0.5">&#9432;</span>
          <div>
            <div className="text-sm font-semibold text-cyan-300 mb-1">The Single Most Important Distinction</div>
            <p className="text-[13px] text-slate-300">
              The <span className="text-rose-400 font-semibold">encoder</span> classifies by mapping the entire input into a fixed vector and projecting it onto label scores.
              The <span className="text-amber-400 font-semibold">decoder</span> classifies by <em>generating the answer as text</em>, token by token.
              Everything else -- data format, training API, quantization, LoRA targets -- follows from this fundamental difference.
            </p>
          </div>
        </div>
      </div>

      {/* Shared Config */}
      <div className="rounded-xl border border-slate-700/40 bg-slate-900/30 p-5">
        <h3 className="text-sm font-bold text-white mb-3">What They Share</h3>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {[
            { label: 'Dataset', value: 'Thai telco intent classification dataset' },
            { label: 'Split', value: '80/10/10' },
            { label: 'Adapter', value: 'LoRA (r=16, alpha=32)' },
            { label: 'Dropout', value: '0.05' },
            { label: 'LR Scheduler', value: 'Cosine' },
            { label: 'Tracking', value: 'MLflow lineage callback' },
            { label: 'Eval strategy', value: 'Every epoch' },
            { label: 'Data columns', value: 'user_message, intent, session_history' },
          ].map((item, i) => (
            <div key={i} className="rounded-lg bg-slate-800/40 border border-slate-700/30 px-3 py-2">
              <div className="text-[10px] text-slate-500 uppercase tracking-wide">{item.label}</div>
              <div className="mono text-[12px] text-slate-200">{item.value}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}


// ======================================================================
// TAB 2: TASK FORMULATION
// ======================================================================

function TaskTab() {
  return (
    <div className="fade-in space-y-8">
      <SectionHeading number="01" title="What is the model actually learning to do?" subtitle="This is the single most important distinction between the two approaches." />

      {/* Comparison Table */}
      <div className="rounded-xl border border-slate-700/40 overflow-hidden">
        <table className="w-full text-[12px]">
          <thead>
            <tr className="bg-slate-800/50">
              <th className="text-left px-4 py-3 text-slate-400 font-medium w-[20%]">Aspect</th>
              <th className="text-left px-4 py-3 font-medium w-[40%]"><span className="text-rose-400">Encoder</span> <span className="text-slate-500">(PhayaThaiBERT)</span></th>
              <th className="text-left px-4 py-3 font-medium w-[40%]"><span className="text-amber-400">Decoder</span> <span className="text-slate-500">(Qwen 2.5-3B)</span></th>
            </tr>
          </thead>
          <tbody>
            {[
              {
                aspect: 'Task formulation',
                encoder: 'Sequence classification: input text maps to one of N integer labels',
                decoder: 'Text generation: model generates JSON like {"intent": "CHECK_BALANCE"} as free text',
              },
              {
                aspect: 'Output layer',
                encoder: 'Linear classification head (768 dims to 16 labels). Randomly initialized, trained from scratch',
                decoder: 'No classification head. Uses the existing LM head to produce tokens',
              },
              {
                aspect: 'Loss function',
                encoder: 'Cross-entropy over label logits (standard classification loss)',
                decoder: 'Next-token prediction loss, masked to assistant turns only (assistant_only_loss=True)',
              },
              {
                aspect: 'Inference output',
                encoder: 'Argmax over 16 logit scores. Deterministic, no parsing needed',
                decoder: 'Free-text generation. Requires JSON parsing and can hallucinate invalid output',
              },
              {
                aspect: 'Label set',
                encoder: 'Fixed: label2id / id2label baked into model config. Adding a new intent requires retraining',
                decoder: 'Open: the model generates intent names as text. New intents can be handled via prompt',
              },
            ].map((row, i) => (
              <tr key={i} className="border-t border-slate-700/30 comparison-row">
                <td className="px-4 py-3 text-slate-300 font-medium">{row.aspect}</td>
                <td className="px-4 py-3 text-slate-300" style={{ borderLeft: '2px solid #f43f5e30' }}>{row.encoder}</td>
                <td className="px-4 py-3 text-slate-300" style={{ borderLeft: '2px solid #fbbf2430' }}>{row.decoder}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Visual: Output Difference */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <CompareCard title="Encoder Output Pipeline" color="#f43f5e" badge="ENC">
          <div className="space-y-3">
            <div className="flex items-center gap-2">
              <div className="rounded-lg bg-rose-500/10 border border-rose-500/20 px-3 py-2 mono text-[11px] text-rose-300">Input text</div>
              <span className="text-slate-500">&#8594;</span>
              <div className="rounded-lg bg-rose-500/10 border border-rose-500/20 px-3 py-2 mono text-[11px] text-rose-300">768-dim vector</div>
              <span className="text-slate-500">&#8594;</span>
              <div className="rounded-lg bg-rose-500/20 border border-rose-500/30 px-3 py-2 mono text-[11px] text-rose-200 font-bold">Label 7</div>
            </div>
            <p className="text-[11px] text-slate-400">Deterministic. Always one of 16 integer labels. No parsing errors possible.</p>
          </div>
        </CompareCard>

        <CompareCard title="Decoder Output Pipeline" color="#fbbf24" badge="DEC">
          <div className="space-y-3">
            <div className="flex items-center gap-2">
              <div className="rounded-lg bg-amber-500/10 border border-amber-500/20 px-3 py-2 mono text-[11px] text-amber-300">Chat prompt</div>
              <span className="text-slate-500">&#8594;</span>
              <div className="rounded-lg bg-amber-500/10 border border-amber-500/20 px-3 py-2 mono text-[11px] text-amber-300">Token gen</div>
              <span className="text-slate-500">&#8594;</span>
              <div className="rounded-lg bg-amber-500/20 border border-amber-500/30 px-3 py-2 mono text-[10px] text-amber-200 font-bold">{`{"intent":"..."}`}</div>
            </div>
            <p className="text-[11px] text-slate-400">Free text. Can hallucinate invalid JSON or unknown intents. Requires parsing.</p>
          </div>
        </CompareCard>
      </div>
    </div>
  );
}


// ======================================================================
// TAB 3: DATA & LORA
// ======================================================================

function DataLoraTab() {
  return (
    <div className="fade-in space-y-10">
      {/* Data Preprocessing */}
      <div>
        <SectionHeading number="02" title="Data Preprocessing" subtitle="Same dataset schema, completely different transformations before reaching the model." />

        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
          <CompareCard title="Flatten and Tokenize" color="#f43f5e" badge="ENC">
            <div className="space-y-3">
              <p className="text-[12px] text-slate-300">Session history and current message are concatenated into a single flat string with role prefixes:</p>
              <div className="mono text-[11px] bg-slate-800/60 border border-slate-700/40 rounded-lg px-3 py-2 text-rose-300">
                Assistant: Hello | User: check my bill | User: billing due date?
              </div>
              <p className="text-[12px] text-slate-400">
                Tokenized into <CodeSnippet>input_ids</CodeSnippet> (padded to 512) and paired with an integer <CodeSnippet>labels</CodeSnippet> field from the label2id mapping.
                Processing uses batched <CodeSnippet>.map(batched=True)</CodeSnippet> for speed.
              </p>
            </div>
          </CompareCard>

          <CompareCard title="Chat Template with Generation Markers" color="#fbbf24" badge="DEC">
            <div className="space-y-3">
              <p className="text-[12px] text-slate-300">Session history is converted into a structured multi-turn chat with system, user, and assistant roles. A custom ChatML template wraps each role with special tokens:</p>
              <div className="mono text-[10px] bg-slate-800/60 border border-slate-700/40 rounded-lg px-3 py-2 text-amber-300">
                {`{% generation %}{{message['content']}}{% endgeneration %}`}
              </div>
              <p className="text-[12px] text-slate-400">
                The target output (<CodeSnippet>{`{"intent": "..."}`}</CodeSnippet>) is appended as the final assistant turn. The formatter has branching logic for Qwen, Phi, DeepSeek, and Gemma.
              </p>
            </div>
          </CompareCard>
        </div>
      </div>

      {/* LoRA Configuration */}
      <div>
        <SectionHeading number="03" title="LoRA Configuration" subtitle="Both use rank 16 and alpha 32 with 0.05 dropout. The differences are in which layers get adapters." />

        <div className="rounded-xl border border-slate-700/40 overflow-hidden">
          <table className="w-full text-[12px]">
            <thead>
              <tr className="bg-slate-800/50">
                <th className="text-left px-4 py-3 text-slate-400 font-medium w-[22%]">Parameter</th>

                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Decision Guide */}
      <div className="callout-box bg-slate-900/40" style={{ '--callout-color': '#a855f7' }}>
        <div className="flex items-start gap-3">
          <span className="text-purple-400 text-lg mt-0.5">&#128218;</span>
          <div>
            <div className="text-sm font-semibold text-purple-300 mb-2">Decision Guide</div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div>
                <p className="text-[12px] text-rose-300 font-semibold mb-1">Choose Encoder when:</p>
                <ul className="text-[11px] text-slate-300 space-y-1">
                  <li className="flex items-start gap-1.5"><span className="text-rose-400 mt-0.5">&#8226;</span> Fixed, well-defined label set</li>
                  <li className="flex items-start gap-1.5"><span className="text-rose-400 mt-0.5">&#8226;</span> Latency and throughput are critical</li>
                  <li className="flex items-start gap-1.5"><span className="text-rose-400 mt-0.5">&#8226;</span> Limited GPU budget</li>
                  <li className="flex items-start gap-1.5"><span className="text-rose-400 mt-0.5">&#8226;</span> Output must be deterministic</li>
                </ul>
              </div>
              <div>
                <p className="text-[12px] text-amber-300 font-semibold mb-1">Choose Decoder when:</p>
                <ul className="text-[11px] text-slate-300 space-y-1">
                  <li className="flex items-start gap-1.5"><span className="text-amber-400 mt-0.5">&#8226;</span> Labels evolve or are open-ended</li>
                  <li className="flex items-start gap-1.5"><span className="text-amber-400 mt-0.5">&#8226;</span> Multi-turn context matters</li>
                  <li className="flex items-start gap-1.5"><span className="text-amber-400 mt-0.5">&#8226;</span> You want to swap models easily</li>
                  <li className="flex items-start gap-1.5"><span className="text-amber-400 mt-0.5">&#8226;</span> Few-shot adaptability is needed</li>
                </ul>
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Source */}
      <div className="text-center">
        <p className="text-[11px] text-slate-500 mono">
          Source: decoder-sft/decoder_lora_finetuning.ipynb vs encoder-sft/encoder_lora_finetuning.ipynb
        </p>
      </div>
    </div>
  );
}
