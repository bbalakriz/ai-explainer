pipelineInfo:
  description: Encoder SFT, Evaluation, and Merge Pipeline via Papermill
  name: llm-sft-eval-merge-pipeline
root:
  dag:
    tasks:
      execute-notebook:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-execute-notebook
        inputs:
          parameters:
            mlflow_token:
              componentInputParameter: mlflow_token
            notebook_path:
              runtimeValue:
                constant: encoder-sft/encoder_lora_finetuning.ipynb
            repo_url:
              componentInputParameter: repo_url
        taskInfo:
          name: LoRA SFT Training
      execute-notebook-2:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-execute-notebook-2
        dependentTasks:
        - execute-notebook
        inputs:
          parameters:
            mlflow_token:
              componentInputParameter: mlflow_token
            notebook_path:
              runtimeValue:
                constant: encoder-sft/encoder_lora_evaluation.ipynb
            repo_url:
              componentInputParameter: repo_url
        taskInfo:
          name: Model Evaluation
      execute-notebook-3:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-execute-notebook-3
        dependentTasks:
        - execute-notebook-2
        inputs:
          parameters:
            mlflow_token:
              componentInputParameter: mlflow_token
            notebook_path:
              runtimeValue:
                constant: encoder-sft/encoder_lora_model_merge.ipynb
            repo_url:
              componentInputParameter: repo_url
        taskInfo:
          name: Merge Weights
  inputDefinitions:
    parameters:
      mlflow_token:
        defaultValue: <<token-here>>
        isOptional: true
        parameterType: STRING
      repo_url:
        defaultValue: https://github.com/<<org>>/<<repo>>.git
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.14.6
---
platforms:
  kubernetes:
    deploymentSpec:
      executors:
        exec-execute-notebook:
          pvcMount:
          - constant: shared-pipeline-data
            mountPath: /mnt/data
            pvcNameParameter:
              runtimeValue:
                constant: shared-pipeline-data
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Equal
        exec-execute-notebook-2:
          pvcMount:
          - constant: shared-pipeline-data
            mountPath: /mnt/data
            pvcNameParameter:
              runtimeValue:
                constant: shared-pipeline-data
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Equal
        exec-execute-notebook-3:
          pvcMount:
          - constant: shared-pipeline-data
            mountPath: /mnt/data
            pvcNameParameter:
              runtimeValue:
                constant: shared-pipeline-data
          tolerations:
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Equal
