    code: `def main(parameters):
    """Executed on EACH worker GPU by Kubeflow Trainer."""
    from datasets import load_dataset
    from transformers import AutoTokenizer, set_seed
    from trl import (ModelConfig, ScriptArguments, SFTConfig,
                     SFTTrainer, TrlParser, get_peft_config,
                     get_quantization_config, get_kbit_device_map)

    parser = TrlParser((ScriptArguments, SFTConfig, ModelConfig))
    script_args, training_args, model_args = parser.parse_dict(parameters)
    set_seed(training_args.seed)

    # ── Quantization (QLoRA) ──
    quantization_config = get_quantization_config(model_args)
    model_kwargs = dict(
        revision=model_args.model_revision,
        attn_implementation=model_args.attn_implementation,
        dtype=model_args.dtype,
        use_cache=False,  # Required for gradient checkpointing
        device_map=get_kbit_device_map() if quantization_config else None,
        quantization_config=quantization_config,
    )
    training_args.model_init_kwargs = model_kwargs

    # ── Tokenizer ──
    tokenizer = AutoTokenizer.from_pretrained(
        model_args.model_name_or_path, use_fast=True)
    if tokenizer.pad_token is None:
        tokenizer.pad_token = tokenizer.eos_token

    # ── Dataset ──
    train_dataset = load_dataset("gsm8k", "main", split="train")
    def template(sample):
        msgs = [{"role":"user","content":sample["question"]},
                {"role":"assistant","content":sample["answer"]}]
        return {"text": tokenizer.apply_chat_template(msgs, tokenize=False)}
    train_dataset = train_dataset.map(template, remove_columns=["question","answer"])

    # ── Train ──
    trainer = SFTTrainer(
        model=model_args.model_name_or_path,
        args=training_args,
        train_dataset=train_dataset,
        peft_config=get_peft_config(model_args),
        processing_class=tokenizer,
    )
    trainer.train()
    trainer.save_model(training_args.output_dir)`,

function CodeBlock({ code, title, language = 'python' }) {
  const lines = code.trim().split('\n');
  return (
    <div className="rounded-xl overflow-hidden" style={{ background: 'rgba(0,0,0,0.5)', border: `1px solid ${C.border}` }}>
      {title && (
        <div className="px-4 py-2 flex items-center gap-2" style={{ background: 'rgba(15,23,42,0.8)', borderBottom: `1px solid ${C.border}` }}>
          <span className="mono text-xs" style={{ color: C.cyan }}>{language}</span>
          <span className="text-xs opacity-60">— {title}</span>
        </div>
      )}
      <pre className="p-4 overflow-x-auto">
        <code className="mono text-xs leading-relaxed">
          {lines.map((line, i) => {
            const isComment = line.trim().startsWith('#') || line.trim().startsWith('//');
            const hasHighlight = line.includes('←');
            return (
              <div key={i} className="flex">
                <span className="select-none opacity-20 mr-4 text-right" style={{ minWidth: '24px' }}>{i + 1}</span>
                <span style={{
                  color: isComment ? '#6b7280' : hasHighlight ? '#fbbf24' : '#e2e8f0',
                  fontStyle: isComment ? 'italic' : 'normal',
                }}>{line}</span>
              </div>
            );
          })}
        </code>
      </pre>
    </div>
  );
}

function ArchDiagram({ layers }) {
  return (
    <div className="space-y-1">
      {layers.map((layer, i) => (
        <div key={i} className="fade-in" style={{ animationDelay: `${i * 0.1}s` }}>
          <div className="rounded-lg p-3" style={{
            background: `linear-gradient(135deg, ${layer.color}10 0%, ${layer.color}05 100%)`,
            border: `1px solid ${layer.color}30`,
          }}>
            <div className="text-xs font-semibold mb-2 opacity-70">{layer.layer}</div>
            <div className="flex flex-wrap gap-2">
              {layer.items.map((item, j) => (
                <span key={j} className="mono text-xs px-2 py-1 rounded-md" style={{
                  background: `${layer.color}15`,
                  border: `1px solid ${layer.color}25`,
                  color: layer.color,
                }}>{item}</span>
              ))}
            </div>
          </div>
          {i < layers.length - 1 && (
            <div className="flex justify-center py-0.5">
              <span className="text-xs opacity-30">▼</span>
            </div>

        </div>

}

          style={{
            background: tab === 'trainjob' ? `${C.green}18` : 'rgba(15,23,42,0.4)',

function StepView({ step }) {
  const renderers = {
    overview: StepOverview,
    prereqs: StepPrereqs,
    workbench: StepWorkbench,
    'training-config': StepTrainingConfig,
    'training-func': StepTrainingFunc,
    'runtime': StepRuntime,
    'submit-trainjob': StepSubmitJob,
    'trainjob-lifecycle': StepLifecycle,
    'trainjob-yaml': StepYaml,
    monitor: StepMonitor,
    'ddp-vs-fsdp-decision': StepDecision,
  };
  const Renderer = renderers[step.id];
  if (!Renderer) return null;
  return <Renderer step={step} />;
}


// ═══════════════════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════════════════

function App() {
  const [step, setStep] = useState(0);
  const current = OVERVIEW_STEPS[step];

  useEffect(() => {
    const handler = (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        setStep(s => Math.min(s + 1, OVERVIEW_STEPS.length - 1));
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        setStep(s => Math.max(s - 1, 0));
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  return (
    <div className="relative z-10 max-w-6xl mx-auto px-4 py-8">
      {/* Header */}
      <div className="text-center mb-8">
        <div className="flex items-center justify-center gap-3 mb-3">
          <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: C.redLight, border: `1px solid ${C.redhat}40` }}>
            <svg viewBox="0 0 36 36" width="24" height="24">
              <path d="M18 3L3 10.5v15L18 33l15-7.5v-15L18 3z" fill={C.redhat} opacity="0.8"/>
              <path d="M18 8l-10 5v10l10 5 10-5V13L18 8z" fill="none" stroke="#fff" strokeWidth="1.5" opacity="0.5"/>
            </svg>
          </div>
          <h1 className="text-2xl font-bold">
            <span style={{ color: C.redhat }}>Red Hat OpenShift AI</span>
            <span className="opacity-40"> — </span>
            <span className="opacity-80">Distributed Training Guide</span>
          </h1>
        </div>
        <p className="text-sm opacity-50">
          Step-by-step: DDP & FSDP on RHOAI with Kubeflow Trainer v2
        </p>
        <p className="mt-1 mono text-xs opacity-30">
          RHOAI 3.2+  |  Kubeflow Trainer v2.2  |  TrainJob + ClusterTrainingRuntime  |  NCCL Backend
        </p>
      </div>

      {/* Step Timeline */}
      <StepTimeline steps={OVERVIEW_STEPS} currentStep={step} setStep={setStep} />

      {/* Current Step Content */}
      <div key={step} className="fade-in">
        {/* Step Header */}
        <div className="rounded-2xl p-6 mb-6" style={{
          background: `linear-gradient(135deg, ${current.color}08 0%, transparent 60%)`,
          border: `1px solid ${current.color}25`,
        }}>
          <div className="flex items-center gap-3 mb-3">
            <div className="w-10 h-10 rounded-xl flex items-center justify-center text-xl step-glow"
              style={{ background: `${current.color}15`, border: `1px solid ${current.color}40` }}>
              {current.icon}
            </div>
            <div>
              <h2 className="text-lg font-bold" style={{ color: current.color }}>{current.title}</h2>
              <p className="text-xs opacity-50">{current.subtitle}</p>
            </div>
          </div>
          <p className="text-sm opacity-70 leading-relaxed">{current.description}</p>
          {current.detail && (
            <p className="text-xs opacity-40 mt-2 leading-relaxed">{current.detail}</p>
          )}
        </div>

        {/* Step Body */}
        <StepView step={current} />

        {/* Navigation */}
        <div className="flex justify-between items-center mt-8 pt-4" style={{ borderTop: `1px solid ${C.border}` }}>
          <button onClick={() => setStep(s => Math.max(s - 1, 0))}
            className="px-4 py-2 rounded-lg text-sm font-medium cursor-pointer transition-all"
            style={{
              background: step > 0 ? C.surface : 'transparent',
              border: `1px solid ${step > 0 ? C.border : 'transparent'}`,
              color: step > 0 ? '#e2e8f0' : 'transparent',
              pointerEvents: step > 0 ? 'auto' : 'none',
            }}>
            ← Previous
          </button>
          <span className="mono text-xs opacity-30">{step + 1} / {OVERVIEW_STEPS.length}</span>
          <button onClick={() => setStep(s => Math.min(s + 1, OVERVIEW_STEPS.length - 1))}
            className="px-4 py-2 rounded-lg text-sm font-medium cursor-pointer transition-all"
            style={{
              background: step < OVERVIEW_STEPS.length - 1 ? `${C.redhat}15` : 'transparent',
              border: `1px solid ${step < OVERVIEW_STEPS.length - 1 ? `${C.redhat}40` : 'transparent'}`,
              color: step < OVERVIEW_STEPS.length - 1 ? C.redhat : 'transparent',
              pointerEvents: step < OVERVIEW_STEPS.length - 1 ? 'auto' : 'none',
            }}>
            Next →
          </button>
        </div>
      </div>

      {/* Footer */}
      <div className="text-center mt-12 pt-6 opacity-30" style={{ borderTop: `1px solid ${C.border}` }}>
        <p className="text-xs">Red Hat OpenShift AI — Distributed Training with DDP & FSDP</p>
        <p className="text-xs mt-1 mono opacity-60">
          Kubeflow Trainer v2.2 | RHOAI 3.2+ | TrainJob + ClusterTrainingRuntime | opendatahub-io/distributed-workloads
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
